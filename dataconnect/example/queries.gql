query ListAllUsers @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  users {
    id
    username
    email
    createdAt
    avatarUrl
    bio
  }
}

query GetUserById($userId: String!) @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  user(key: {id: $userId}) {
    id
    username
    email
    createdAt
    avatarUrl
    bio
  }
}

mutation CreateUser($username: String!, $email: String!, $createdAt: Timestamp!) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  user_insert(data: {
    username: $username,
    email: $email,
    createdAt: $createdAt,
    id_expr: "auth.uid"
  }) {
    id
  }
}

mutation UpdateUserProfile($avatarUrl: String, $bio: String) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  user_update(key: {id_expr: "auth.uid"}, data: {
    avatarUrl: $avatarUrl,
    bio: $bio
  }) {
    id
  }
}